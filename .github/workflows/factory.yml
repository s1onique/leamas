# Factory CI - Runs Factory quality gates on pull requests and protected branches
name: Factory

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  factory:
    name: Factory Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Bootstrap git hooks
        run: make bootstrap

      - name: Build binary
        run: |
          mkdir -p bin
          CGO_ENABLED=0 go build -trimpath -o bin/leamas ./cmd/leamas

      - name: Run factorize
        run: make factorize

      - name: Run gate
        run: make gate

      - name: Run LLM-friendly verify
        run: ./bin/leamas factory verify llm-friendly

      - name: Run agent-context verify
        run: ./bin/leamas factory verify agent-context

      - name: Run forbidden-patterns verify
        run: ./bin/leamas factory verify forbidden-patterns

      - name: Run go test
        run: go test ./...

      - name: Run go vet
        run: go vet ./...
