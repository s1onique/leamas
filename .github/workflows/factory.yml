# Factory CI - Runs Factory quality gates on pull requests and protected branches
name: Factory

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  factory-fast:
    name: Factory Fast
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Bootstrap git hooks
        run: make bootstrap

      - name: Build binary
        run: |
          mkdir -p bin
          CGO_ENABLED=0 go build -trimpath -o bin/leamas ./cmd/leamas

      - name: Run gate-fast
        run: make gate-fast

  factory-dupcode:
    name: Factory Dupcode
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Run gate-dupcode
        run: make gate-dupcode

  factory-long:
    name: Factory Long
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Run registered long tests
        run: make test-long
